<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Jailson Bezerra</title>
    <meta name="description" content="Artigos e insights de Jailson Bezerra sobre engenharia de software, dados, IoT e IA agêntica.">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 680px;
            width: 100%;
        }

        .back-link {
            display: inline-block;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.3rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        .posts-grid {
            display: grid;
            gap: 1.1rem;
        }

        .post-card {
            background-color: var(--card-bg);
            padding: 1.4rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-primary);
            transition: transform 0.2s, background-color 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            border: 1px solid rgba(56, 189, 248, 0.05);
        }

        .post-card:hover {
            transform: translateY(-3px);
            background-color: #243249;
            border-color: var(--accent);
        }

        .post-card:hover .post-arrow {
            transform: translateX(3px);
        }

        .post-content {
            min-width: 0;
        }

        .post-date {
            font-size: 0.78rem;
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            display: block;
            margin-bottom: 0.5rem;
        }

        .post-title {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.3px;
            display: block;
            margin-bottom: 0.5rem;
        }

        .post-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .post-arrow {
            font-size: 1.2rem;
            color: var(--accent);
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .state-message {
            color: var(--text-secondary);
            padding: 2rem 0;
            text-align: center;
        }

        footer {
            margin-top: 5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="../" class="back-link">&larr; Voltar para a Home</a>

        <h1>Artigos & Insights</h1>
        <p class="subtitle">Notas sobre engenharia de software, dados, IoT e IA agêntica.</p>

        <div id="posts-list" class="posts-grid">
            <p class="state-message">Carregando artigos...</p>
        </div>

        <footer>
            &copy; 2026 jailson.es &bull; Blog
        </footer>
    </div>

    <script>
        // Configurações do repositório GitHub onde o Pages CMS grava os posts
        const owner = 'jailsonsb2';
        const repo = 'jailson';
        const path = 'blog/posts';
        const branch = 'main';

        function parseFrontmatter(text) {
            const match = text.match(/^---\s*[\r\n]([\s\S]*?)[\r\n]---/);
            const data = {};
            if (match) {
                match[1].split(/\r?\n/).forEach(line => {
                    const idx = line.indexOf(':');
                    if (idx === -1) return;
                    const key = line.slice(0, idx).trim();
                    let value = line.slice(idx + 1).trim();
                    value = value.replace(/^['"]|['"]$/g, '');
                    data[key] = value;
                });
            }
            return data;
        }

        async function loadPosts() {
            const listElement = document.getElementById('posts-list');
            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`);
                if (!response.ok) throw new Error('Erro ao buscar posts');

                const files = await response.json();
                const mdFiles = files.filter(file => file.name.endsWith('.md'));

                if (mdFiles.length === 0) {
                    listElement.innerHTML = '<p class="state-message">Nenhum artigo publicado ainda.</p>';
                    return;
                }

                const posts = await Promise.all(mdFiles.map(async file => {
                    const rawResponse = await fetch(file.download_url);
                    const text = await rawResponse.text();
                    const meta = parseFrontmatter(text);
                    return {
                        slug: file.name.replace(/\.md$/, ''),
                        title: meta.title || file.name,
                        description: meta.description || '',
                        date: meta.date ? new Date(meta.date) : null
                    };
                }));

                // Mais recentes primeiro
                posts.sort((a, b) => (b.date || 0) - (a.date || 0));

                listElement.innerHTML = '';
                posts.forEach(post => {
                    const dateStr = post.date
                        ? post.date.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' })
                        : '';

                    const card = document.createElement('a');
                    card.className = 'post-card';
                    card.href = `posts/post.html?p=${encodeURIComponent(post.slug)}`;
                    card.innerHTML = `
                        <div class="post-content">
                            <span class="post-date">${dateStr}</span>
                            <span class="post-title">${post.title}</span>
                            <p class="post-desc">${post.description}</p>
                        </div>
                        <div class="post-arrow">➜</div>
                    `;
                    listElement.appendChild(card);
                });
            } catch (error) {
                listElement.innerHTML = '<p class="state-message">Erro ao carregar os artigos. Tente novamente mais tarde.</p>';
                console.error(error);
            }
        }

        loadPosts();
    </script>
</body>
</html>
