<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Jailson</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #fff; }
        .post-card { border-bottom: 1px solid #333; padding: 20px 0; }
        .post-card a { color: #4fc3f7; text-decoration: none; font-size: 1.2rem; font-weight: bold; }
        .post-card p { color: #aaa; margin: 8px 0 0 0; }
        .post-date { font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>

    <a href="../" style="color: #aaa; text-decoration: none;">← Voltar para a Home</a>
    <h1>Artigos & Insights</h1>
    
    <div id="posts-list">Carregando artigos...</div>

    <script>
        // Configurações do seu repositório
        const owner = 'jailsonsb2'; 
        const repo = 'jailson';     
        const path = 'blog/posts';  

        async function loadPosts() {
            const listElement = document.getElementById('posts-list');
            try {
                // 1. Busca a lista de arquivos na pasta do GitHub
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`);
                if (!response.ok) throw new Error('Erro ao buscar posts');
                
                const files = await response.json();
                
                // Filtra apenas arquivos markdown (.md)
                const mdFiles = files.filter(file => file.name.endsWith('.md'));
                
                if (mdFiles.length === 0) {
                    listElement.innerHTML = '<p>Nenhum artigo publicado ainda.</p>';
                    return;
                }

                listElement.innerHTML = ''; // Limpa o "Carregando"

                // 2. Loop para ler cada arquivo e renderizar na tela
                for (const file of mdFiles) {
                    const rawResponse = await fetch(file.download_url);
                    const text = await rawResponse.text();
                    
                    // Regex simples para extrair o Frontmatter (título e descrição que o Pages CMS salva)
                    const titleMatch = text.match(/title:\s*(.*)/);
                    const descMatch = text.match(/description:\s*(.*)/);
                    const dateMatch = text.match(/date:\s*(.*)/);

                    const title = titleMatch ? titleMatch[1].replace(/['"]/g, '') : file.name;
                    const desc = descMatch ? descMatch[1].replace(/['"]/g, '') : '';
                    let dateStr = dateMatch ? dateMatch[1] : '';
                    if (dateStr) dateStr = new Date(dateStr).toLocaleDateString('pt-BR');

                    // Nome do arquivo sem .md para criar o link limpo
                    const slug = file.name.replace('.md', '');

                    // Cria o HTML do card do post
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerHTML = `
                        <a href="post.html?p=${slug}">${title}</a>
                        <div class="post-date">${dateStr}</div>
                        <p>${desc}</p>
                    `;
                    listElement.appendChild(card);
                }
            } catch (error) {
                listElement.innerHTML = '<p>Erro ao carregar os artigos. Tente novamente mais tarde.</p>';
                console.error(error);
            }
        }

        loadPosts();
    </script>
</body>
</html>
