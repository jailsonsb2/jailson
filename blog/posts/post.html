<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artigo | Jailson Bezerra</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 680px;
            width: 100%;
        }

        .back-link {
            display: inline-block;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent);
        }

        .post-date {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        article h1 {
            font-size: 2rem;
            letter-spacing: -0.5px;
            margin-bottom: 1.5rem;
        }

        article {
            line-height: 1.7;
            font-size: 1rem;
        }

        article p {
            margin-bottom: 1.2rem;
            color: var(--text-primary);
        }

        article h2, article h3 {
            margin: 1.8rem 0 1rem;
            letter-spacing: -0.3px;
        }

        article a {
            color: var(--accent);
        }

        article ul, article ol {
            margin: 0 0 1.2rem 1.5rem;
        }

        article li {
            margin-bottom: 0.4rem;
        }

        article pre {
            background: var(--card-bg);
            padding: 1rem;
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid rgba(56, 189, 248, 0.1);
            margin-bottom: 1.2rem;
        }

        article code {
            font-family: 'Consolas', monospace;
            color: #f9a8d4;
            font-size: 0.9em;
        }

        article pre code {
            color: var(--text-primary);
        }

        article img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1rem 0;
        }

        article blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 1rem;
            color: var(--text-secondary);
            margin-bottom: 1.2rem;
        }

        .state-message {
            color: var(--text-secondary);
        }

        footer {
            margin-top: 5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="../" class="back-link">&larr; Voltar para o Blog</a>

        <div id="post-date" class="post-date"></div>
        <article id="post-content">
            <p class="state-message">Carregando conteúdo...</p>
        </article>

        <footer>
            &copy; 2026 jailson.es &bull; Blog
        </footer>
    </div>

    <script>
        const owner = 'jailsonsb2';
        const repo = 'jailson';
        const path = 'blog/posts';
        const branch = 'main';

        const urlParams = new URLSearchParams(window.location.search);
        const postSlug = urlParams.get('p');

        function parseFrontmatter(text) {
            const match = text.match(/^---\s*[\r\n]([\s\S]*?)[\r\n]---/);
            const data = {};
            if (match) {
                match[1].split(/\r?\n/).forEach(line => {
                    const idx = line.indexOf(':');
                    if (idx === -1) return;
                    const key = line.slice(0, idx).trim();
                    let value = line.slice(idx + 1).trim();
                    value = value.replace(/^['"]|['"]$/g, '');
                    data[key] = value;
                });
            }
            return data;
        }

        async function loadPostContent() {
            const articleElement = document.getElementById('post-content');
            const dateElement = document.getElementById('post-date');

            if (!postSlug) {
                articleElement.innerHTML = '<p class="state-message">Artigo não encontrado.</p>';
                return;
            }

            try {
                const response = await fetch(`https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${path}/${postSlug}.md`);
                if (!response.ok) throw new Error('Artigo não encontrado');

                const text = await response.text();
                const meta = parseFrontmatter(text);
                const body = text.replace(/^---[\s\S]*?---/, '').trim();

                document.title = `${meta.title || 'Artigo'} | Jailson Bezerra`;

                if (meta.date) {
                    dateElement.textContent = new Date(`${meta.date}T00:00:00`).toLocaleDateString('pt-BR', {
                        day: '2-digit', month: 'long', year: 'numeric'
                    });
                }

                const titleHtml = meta.title ? `<h1>${meta.title}</h1>` : '';
                articleElement.innerHTML = titleHtml + marked.parse(body);
            } catch (error) {
                articleElement.innerHTML = '<p class="state-message">Erro ao carregar o conteúdo do artigo.</p>';
                console.error(error);
            }
        }

        loadPostContent();
    </script>
</body>
</html>
