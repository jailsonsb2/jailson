media_folder: "images/uploads" # Onde as imagens dos posts serão salvas
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Artigos do Blog"
    folder: "blog/posts" # Pasta que criamos no Passo 1
    create: true # Permite criar novos posts pelo painel
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Data de Publicação", name: "date", widget: "datetime" }
      - { label: "Descrição Curta", name: "description", widget: "text" }
      - { label: "Conteúdo", name: "body", widget: "markdown" }